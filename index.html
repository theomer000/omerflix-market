<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>omerFlix Market | YouTube Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ana: #a020f0; --gold: #ffd700; --bg: #050505; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* BAN EKRANI */
        #ban-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; color: white; z-index: 100000; justify-content: center; align-items: center; text-align: center; font-weight: 900; font-size: 30px; }

        header { background: rgba(10,10,10,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--ana); position: sticky; top:0; z-index: 1000; }
        .nav-btn { background: var(--ana); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* YOUTUBE PLAYER KUTUSU */
        #yt-player-box { 
            position: fixed; bottom: 20px; left: 20px; 
            background: #000; border: 2px solid var(--ana); 
            border-radius: 15px; width: 280px; padding: 10px; 
            z-index: 2000; box-shadow: 0 0 20px var(--ana);
        }
        .yt-input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        #yt-url { background: #111; border: 1px solid #333; color: white; padding: 5px; border-radius: 5px; flex: 1; font-size: 11px; }
        #player-frame { width: 100%; height: 150px; border-radius: 10px; border: none; }

        .market-container { padding: 20px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid #333; text-align: center; padding-bottom: 15px; }
        .card img { width: 100%; height: 120px; object-fit: contain; padding: 10px; }
    </style>
</head>
<body>

<div id="ban-screen">YASAKLI KELİME KULLANDIĞIN İÇİN BANLANDIN!<br>ERİŞİMİN ENGELLENDİ.</div>

<header>
    <div style="font-weight: 900; font-size: 20px;">OMER<span>FLIX</span></div>
    <button class="nav-btn" onclick="togglePlayer()"><i class="fa fa-youtube"></i> Müzik</button>
</header>

<div class="market-container" id="market-space"></div>

<div id="yt-player-box" style="display: none;">
    <div style="font-size: 11px; font-weight: bold; color: var(--ana); margin-bottom: 5px;">YouTube Mini Player</div>
    <div class="yt-input-group">
        <input type="text" id="yt-url" placeholder="Şarkı adı veya YouTube Linki...">
        <button class="nav-btn" style="padding: 5px 10px;" onclick="searchMusic()"><i class="fa fa-play"></i></button>
    </div>
    <iframe id="player-frame" src=""></iframe>
</div>

<script>
    // --- OTOMATİK BAN SİSTEMİ ---
    const yasakliKelimeler = ["küfür1", "küfür2", "saçma1", "mal", "terbiye", "siyaset"]; // Buraya banlanmasını istediğin kelimeleri ekle
    
    if(localStorage.getItem('isBanned') === 'true') {
        document.getElementById('ban-screen').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function checkBan(text) {
        const lowerText = text.toLowerCase();
        const banla = yasakliKelimeler.some(kelime => lowerText.includes(kelime));
        if(banla) {
            localStorage.setItem('isBanned', 'true');
            location.reload();
        }
    }

    // --- PLAYER SİSTEMİ ---
    function togglePlayer() {
        const box = document.getElementById('yt-player-box');
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    function searchMusic() {
        const input = document.getElementById('yt-url').value;
        if(!input) return;

        // Önce ban kontrolü yap
        checkBan(input);

        let videoId = "";
        if(input.includes("v=")) {
            videoId = input.split("v=")[1].split("&")[0];
        } else if(input.includes("youtu.be/")) {
            videoId = input.split("youtu.be/")[1];
        } else {
            // Sadece isim yazdıysa direkt YouTube'da aratır (Daha güvenli embed linki)
            videoId = "https://www.youtube.com/embed?listType=search&list=" + encodeURIComponent(input);
            document.getElementById('player-frame').src = videoId;
            return;
        }
        
        document.getElementById('player-frame').src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    }

    // --- MARKET RENDER ---
    let prods = JSON.parse(localStorage.getItem('pazar_ilanlar')) || [{id:1, name:"PUBG Mobile UC", price:"250 TL", img:"35953.jpg"}];
    function render() {
        const space = document.getElementById('market-space');
        space.innerHTML = "";
        prods.forEach(p => {
            space.innerHTML += `<div class="card"><img src="${p.img}"><h4>${p.name}</h4><div style="color:var(--gold); font-weight:bold;">${p.price}</div></div>`;
        });
    }

    window.onload = render;
</script>
</body>
</html>
