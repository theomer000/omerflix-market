<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>omerFlix Market | Hızlı Giriş</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ana: #a020f0; --gold: #ffd700; --bg: #050505; --card: #111; --text: #fff; --glow: 0 0 20px rgba(160, 32, 240, 0.7); }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- HIZLI INTRO (1 Saniye) --- */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .intro-circle { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--ana); overflow: hidden; box-shadow: var(--glow); animation: pulse 1s infinite alternate; margin-bottom: 15px; }
        .intro-circle img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-text { font-size: 18px; color: var(--gold); font-weight: bold; }

        header { background: rgba(15,15,15,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--ana); position: sticky; top:0; z-index: 100; }
        
        #admin-controls { background: #111; padding: 20px 5%; border-bottom: 2px solid var(--gold); display: none; }
        .admin-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        @media(min-width: 768px) { .admin-grid { grid-template-columns: 1fr 1fr; } }
        .admin-section { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        input, select { background: #000; border: 1px solid var(--ana); color: white; padding: 10px; border-radius: 8px; width: 92%; margin-bottom: 10px; }
        .btn-action { background: var(--ana); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        /* --- MÜZİK --- */
        #music-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        #music-panel { background: rgba(20, 20, 20, 0.95); padding: 15px; border-radius: 20px; border: 1px solid var(--ana); width: 200px; margin-bottom: 10px; transition: 0.4s; transform: translateX(300px); opacity: 0; pointer-events: none; }
        #music-panel.active { transform: translateX(0); opacity: 1; pointer-events: all; }
        .track-item { padding: 8px; font-size: 11px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; background: #1a1a1a; text-align: center; border: 1px solid transparent; }
        .track-item.active { border-color: var(--gold); background: var(--ana); }

        /* MARKET */
        .category-header { padding: 20px 5% 0; color: var(--ana); margin-top: 10px; }
        .container { padding: 20px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid #222; transition: 0.3s; position: relative; overflow: hidden; text-align: center; padding-bottom: 10px; }
        .card:hover { border-color: var(--ana); }
        .card img { width: 100%; height: 160px; object-fit: contain; padding: 10px; }
        .edit-badge { position: absolute; top: 5px; left: 5px; background: var(--gold); color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; display: none; }
        .delete-badge { position: absolute; top: 5px; right: 5px; background: #ff4d4d; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: none; }
        .admin-active .edit-badge, .admin-active .delete-badge { display: block; }
        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="intro-circle"><img src="35906.png" onerror="this.src='https://via.placeholder.com/200?text=Logo'"></div>
        <div class="welcome-text">Hoşgeldin Reis</div>
    </div>

    <div id="music-container">
        <div id="music-panel">
            <div class="track-item" onclick="playYT('VuHCasWGDSg', this)">8D Music</div>
            <div class="track-item" onclick="playYT('wGAH8PSk-rg', this)">Çok Pardon</div>
            <button onclick="stopYT()" style="width:100%; background:#ff4d4d; border:none; color:white; padding:5px; border-radius:5px; cursor:pointer;">DURDUR</button>
            <div id="player"></div>
        </div>
        <button onclick="document.getElementById('music-panel').classList.toggle('active')" style="background:var(--ana); color:white; border:none; width:50px; height:50px; border-radius:50%; cursor:pointer; font-size:20px; box-shadow: var(--glow);"><i class="fa fa-music"></i></button>
    </div>

    <header>
        <div class="logo">OMER<span>FLIX</span></div>
        <button onclick="toggleAdmin()" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:5px; cursor:pointer;">Panel</button>
    </header>

    <div id="admin-controls">
        <div class="admin-grid">
            <div class="admin-section">
                <input type="text" id="cat-name" placeholder="Yeni Kategori">
                <button class="btn-action" onclick="addCat()">Ekle</button>
                <select id="cat-del" style="margin-top:10px;"></select>
                <button class="btn-action" style="background:#ff4d4d;" onclick="delCat()">Kategori Sil</button>
            </div>
            <div class="admin-section">
                <input type="hidden" id="edit-id">
                <input type="text" id="p-name" placeholder="Ürün Adı">
                <input type="text" id="p-price" placeholder="Fiyat">
                <input type="text" id="p-img" placeholder="Resim İsmi (34726.jpg)">
                <select id="p-cat"></select>
                <button class="btn-action" style="background:var(--gold); color:black;" id="btn-save" onclick="saveP()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="market-space"></div>

    <script>
        let cats = JSON.parse(localStorage.getItem('m_cats')) || ["Hileler"];
        let prods = JSON.parse(localStorage.getItem('m_prods')) || [{ id: 1, name: "PUBG VIP Hile", price: "150.00 TL", img: "34726.jpg", cat: "Hileler" }];

        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var yt;
        function onYouTubeIframeAPIReady() { yt = new YT.Player('player', { height: '0', width: '0', videoId: '' }); }
        function playYT(id, el) { document.querySelectorAll('.track-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); yt.loadVideoById(id); yt.playVideo(); }
        function stopYT() { yt.stopVideo(); document.querySelectorAll('.track-item').forEach(i=>i.classList.remove('active')); }

        function render() {
            const space = document.getElementById('market-space');
            const selAdd = document.getElementById('p-cat');
            const selDel = document.getElementById('cat-del');
            space.innerHTML = ""; selAdd.innerHTML = ""; selDel.innerHTML = "";

            cats.forEach(c => {
                selAdd.innerHTML += `<option value="${c}">${c}</option>`;
                selDel.innerHTML += `<option value="${c}">${c}</option>`;
                const items = prods.filter(p => p.cat === c);
                space.innerHTML += `<div class="category-header"><h3>${c}</h3></div><div class="container" id="c-${c}"></div>`;
                const box = document.getElementById(`c-${c}`);
                items.forEach(p => {
                    box.innerHTML += `
                        <div class="card">
                            <span class="edit-badge" onclick="editP(${p.id})">DÜZENLE</span>
                            <span class="delete-badge" onclick="delP(${p.id})">×</span>
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/200?text=Resim'">
                            <h4>${p.name}</h4>
                            <div style="color:var(--gold); font-weight:bold;">${p.price}</div>
                            <button onclick="alert('Discord\'dan ulaş: theomer')" style="width:80%; padding:8px; background:var(--ana); color:white; border:none; border-radius:8px; margin-top:10px; cursor:pointer;">Satın Al</button>
                        </div>`;
                });
            });
        }

        function addCat() { const n = document.getElementById('cat-name').value; if(n){ cats.push(n); sync(); document.getElementById('cat-name').value=""; } }
        function delCat() { const n = document.getElementById('cat-del').value; cats = cats.filter(c=>c!==n); prods = prods.filter(p=>p.cat!==n); sync(); }
        function saveP() {
            const id = document.getElementById('edit-id').value;
            const n = document.getElementById('p-name').value, pr = document.getElementById('p-price').value, img = document.getElementById('p-img').value, c = document.getElementById('p-cat').value;
            if(id) { const i = prods.findIndex(p=>p.id==id); prods[i] = {id: parseInt(id), name:n, price:pr, img, cat:c}; }
            else { prods.push({id: Date.now(), name:n, price:pr, img, cat:c}); }
            cancel(); sync();
        }
        function editP(id) { const p = prods.find(p=>p.id==id); document.getElementById('edit-id').value=p.id; document.getElementById('p-name').value=p.name; document.getElementById('p-price').value=p.price; document.getElementById('p-img').value=p.img; document.getElementById('p-cat').value=p.cat; document.getElementById('btn-save').innerText="Güncelle"; window.scrollTo(0,0); }
        function delP(id) { prods = prods.filter(p=>p.id!=id); sync(); }
        function cancel() { document.getElementById('edit-id').value=""; document.getElementById('p-name').value=""; document.getElementById('p-price').value=""; document.getElementById('p-img').value=""; document.getElementById('btn-save').innerText="Kaydet"; }
        function sync() { localStorage.setItem('m_cats', JSON.stringify(cats)); localStorage.setItem('m_prods', JSON.stringify(prods)); render(); }
        function toggleAdmin() { const a = document.getElementById('admin-controls'); a.style.display = a.style.display === 'block' ? 'none' : 'block'; document.body.classList.toggle('admin-active'); }

        window.onload = () => {
            render();
            setTimeout(() => {
                const s = document.getElementById('loading-screen');
                s.style.opacity = '0';
                setTimeout(() => s.style.display = 'none', 500);
            }, 1000); // 1 Saniye sonra dükkan açılır
        };
    </script>
</body>
</html>
